title: Yggdrasil API 配置

url:
  label: 本站的 Yggdrasil API 地址：
  notice: 请确认以上 URL 能够正常访问后再进行 authlib-injector 的配置。

common:
  title: 常规配置
  ygg_uuid_algorithm:
    title: UUID 生成算法
    v3: 'Version 3: 与原盗版用户 UUID 一致（推荐）'
    v4: 'Version 4: 随机生成（想要同时兼容盗版登录的不要选）'
    hint: 选择 Version 3 以获得对原盗版服务器的最佳兼容性。
  ygg_token_expire_1:
    title: 令牌暂时失效时间
  ygg_token_expire_2:
    title: 令牌完全失效时间
    description: 分别指定 Token「暂时失效」与「完全失效」的过期时间，单位为秒
  ygg_rate_limit:
    title: 登录/登出频率限制
    hint: 两次操作之间的时间间隔（毫秒）
  ygg_skin_domain:
    title: 额外皮肤白名单域名
    description: 只有在此列表中的材质才能被加载。「本站地址」和「当前访问地址」已经默认添加至白名单列表，需要添加的额外白名单域名请使用半角逗号 (,) 分隔
  ygg_search_profile_max:
    title: 批量查询角色数量限制
    hint: 一次请求中最多能查询几个角色
  ygg_show_config_section:
    title: 显示快速配置板块
    label: 在用户中心首页显示「快速配置启动器」板块
  ygg_enable_ali:
    title: API 地址指示
    label: 开启「API 地址指示 (ALI)」功能

mojang:
  title: 正版账号绑定（微软 OAuth）
  client_id:
    title: Azure 应用程序 (客户端) ID
    hint: 在 Azure 门户「应用注册」中获取
  client_secret:
    title: Azure 客户端密码
    hint: 在 Azure 门户「证书和密码」中生成，注意及时复制，离开页面后不再显示

keypair:
  title: 密钥对配置
  ygg_private_key:
    title: OpenSSL 私钥
    hint: 只需填写 PEM 格式的私钥即可，公钥会根据私钥自动生成。
    generate: 生成私钥
    submit: 保存私钥
    message: 使用下方的按钮来自动生成符合格式的私钥。
    valid: 私钥有效。
    invalid: 无效的私钥，请检查后重新配置。

rsa:
  invalid: 无效的 RSA 私钥，请访问插件配置页重新设置
  length: RSA 私钥的长度至少为 4096，请访问插件配置页重新设置

union:
  title: MUA 联合认证
  api_root:
    title: 联盟 API 根地址
    hint: MUA 联盟中央服务器的根地址，不清楚保持默认即可
  member_key:
    title: 联盟成员密钥（Member Key）
    hint: 加入 MUA 联盟后由中央服务器签发；留空则不启用联盟同步
  enable_update:
    title: 自动更新
    label: 允许中央服务器推送站点列表与联盟共享私钥的更新
  data:
    title: 联盟数据手动同步
    label: 增量同步通过事件钩子自动完成；初次接入或怀疑数据漂移时可手动触发以下操作。
    trigger_update_list: 拉取站点列表
    trigger_update_key: 拉取共享私钥
    trigger_sync: 全量推送本站角色
    trigger_diagnose: 网络诊断
    success: 已发起 {action}。
    failed: '操作 {action} 失败：{message}'

restore:
  title: 跨站重签端点
  enable:
    title: /restore 端点
    label: 暴露 POST /api/yggdrasil/restore 用于跨站 profile 重签（接入 MUA 联盟时必须开启）
